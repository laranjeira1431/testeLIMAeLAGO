    <dialog id="direitoFam">
        <h1>Direito da Família</h1>
        <svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="24" height="24" viewBox="0 0 17 17" onclick="fechar1()">

        </svg>
        <ul style="list-style-type: none;">
            <li>Divórcio e separação (judicial ou extrajudicial)</li>
            <li>Pensão alimentícia (fixação, revisão, exoneração, execução de alimentos)</li>
            <li>Guarda e visitas (guarda compartilhada, unilateral, regulamentação de convivência)</li>
            <li>Reconhecimento e dissolução de união estável</li>
            <li>Adoção</li>
            <li>Investigação de paternidade e reconhecimento de filiação</li>
            <li>Regime de bens e partilha de patrimônio</li>
            <li>Interdição e curatela</li>

        </ul>
    </dialog>
    <dialog id="direitoCon">
        <h1>Direito do Consumidor</h1>
        <svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="24" height="24" viewBox="0 0 17 17" onclick="fechar()">

        </svg>
        <ul style="list-style-type: none;">
            <li>Ações contra empresas por defeito de produto ou serviço</li>
            <li>Cobranças indevidas (ex: valores não contratados, tarifas abusivas)</li>
            <li>Cláusulas abusivas em contratos de consumo</li>
            <li>Atrasos ou cancelamentos (ex: passagens aéreas, entregas de produtos)</li>
            <li>Inscrição indevida em cadastros de inadimplentes (SPC/Serasa)</li>
            <li>Direitos do consumidor em compras online (arrependimento, trocas, devoluções)</li>
            <li>Problemas com instituições financeiras (cartões, empréstimos, consignados não autorizados)</li>
            <li>Ações coletivas de consumo (ex: recalls, vícios em produtos vendidos em massa)</li>
            <li>Intermediação com órgãos de defesa do consumidor (ex: Procon, Senacon)</li>
        </ul>
    </dialog>
